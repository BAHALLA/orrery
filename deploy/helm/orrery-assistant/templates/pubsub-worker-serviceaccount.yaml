{{- if and .Values.pubsubWorker.enabled .Values.pubsubWorker.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "orrery-assistant.pubsubWorker.serviceAccountName" . }}
  labels:
    {{- include "orrery-assistant.pubsubWorker.labels" . | nindent 4 }}
  {{- with .Values.pubsubWorker.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
