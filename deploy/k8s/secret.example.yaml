# ── EXAMPLE ONLY — DO NOT COMMIT REAL SECRETS ─────────────────────────
#
# Create this with `kubectl create secret` or manage via a secrets operator
# (External Secrets Operator, Sealed Secrets, HashiCorp Vault, etc.).
#
# Example:
#   kubectl -n ai-agents create secret generic devops-assistant-secrets \
#     --from-literal=GOOGLE_API_KEY=... \
#     --from-literal=ANTHROPIC_API_KEY=... \
#     --from-literal=DATABASE_URL=postgresql+asyncpg://user:pass@postgres:5432/agents
#
apiVersion: v1
kind: Secret
metadata:
  name: devops-assistant-secrets
  namespace: ai-agents
type: Opaque
stringData:
  GOOGLE_API_KEY: "REPLACE_ME"
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  # PostgreSQL connection string (required for multi-instance).
  DATABASE_URL: "postgresql+asyncpg://agents:REPLACE_ME@postgres.ai-agents.svc.cluster.local:5432/agents"
  # Slack bot (only required if deploying the slack-bot workload).
  SLACK_BOT_TOKEN: ""
  SLACK_SIGNING_SECRET: ""
  # JWT secret for the HTTP API auth middleware (AEP-013).
  JWT_SECRET: ""
