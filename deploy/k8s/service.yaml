apiVersion: v1
kind: Service
metadata:
  name: devops-assistant
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: devops-assistant
    app.kubernetes.io/component: agent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: devops-assistant
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9100
      targetPort: metrics
      protocol: TCP
