apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-assistant
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: devops-assistant
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: ai-agents
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: devops-assistant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devops-assistant
        app.kubernetes.io/component: agent
      annotations:
        # Force rollout when ConfigMap/Secret changes by updating this annotation.
        kubectl.kubernetes.io/restartedAt: ""
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: devops-assistant
      # Give in-flight LLM calls time to finish on SIGTERM.
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: devops-assistant
          image: ghcr.io/bahalla/devops-agents:latest
          imagePullPolicy: IfNotPresent
          args:
            - "adk"
            - "web"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "agents/devops-assistant"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: health
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9100
              protocol: TCP
          envFrom:
            - configMapRef:
                name: devops-assistant-config
            - secretRef:
                name: devops-assistant-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            # Allow up to 60s (12 * 5s) for the agent process to boot,
            # cache the model connection, and start the health server.
            periodSeconds: 5
            failureThreshold: 12
          lifecycle:
            preStop:
              # Gives the load balancer time to remove the pod from rotation
              # before SIGTERM is delivered — reduces in-flight request drops.
              exec:
                command: ["sh", "-c", "sleep 10"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /home/appuser/.cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: cache
          emptyDir:
            sizeLimit: 512Mi
