apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-assistant
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: devops-assistant
    app.kubernetes.io/part-of: ai-agents
---
# Read-only access for the k8s_health_agent tools (read-only deployments,
# pods, nodes, events). Destructive operations (rollback, scale) are gated
# by the RBAC/guardrails layer in code, but should not have cluster-admin.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-assistant-read
  labels:
    app.kubernetes.io/name: devops-assistant
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "namespaces", "events", "nodes", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
# Write access is a SEPARATE ClusterRole so it can be omitted in production
# environments where remediation should be human-in-the-loop only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-assistant-write
  labels:
    app.kubernetes.io/name: devops-assistant
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-assistant-read
subjects:
  - kind: ServiceAccount
    name: devops-assistant
    namespace: ai-agents
roleRef:
  kind: ClusterRole
  name: devops-assistant-read
  apiGroup: rbac.authorization.k8s.io
