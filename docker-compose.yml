services:
  kafka:
    image: confluentinc/cp-kafka:7.9.2
    hostname: kafka
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:19092,CONTROLLER://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      # Performance and resource settings for local development
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DELETE_TOPIC_ENABLE: 'true'
      KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server kafka:19092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: kafbat/kafka-ui
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      DYNAMIC_CONFIG_ENABLED: 'true'

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: kafka-exporter
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka:19092"
      - "--topic.filter=.*"
      - "--group.filter=.*"

  # ── Session storage ──────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agents_secret}
      POSTGRES_DB: ${POSTGRES_DB:-agents}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agents} -d ${POSTGRES_DB:-agents}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Observability stack ───────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=1d"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.5.0
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Elasticsearch stack (use: docker compose --profile elastic up) ─

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    profiles: [elastic]
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    profiles: [elastic]
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── Agent services (use: docker compose --profile demo up) ─────────

  orrery-assistant:
    # Pull the published image by default; local `docker compose build` still
    # works and will tag the build with this name.
    image: ${ORRERY_IMAGE:-ghcr.io/bahalla/orrery:latest}
    build: .
    container_name: orrery-assistant
    profiles: [demo]
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    environment:
      # ── LLM provider (pick one) ──────────────────────────────────
      # Option 1: Google AI Studio (default)
      GOOGLE_GENAI_USE_VERTEXAI: "FALSE"
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # Option 2: Vertex AI (uncomment and set these instead)
      # GOOGLE_GENAI_USE_VERTEXAI: "TRUE"
      # GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      # GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
      # Option 3: Any LiteLLM provider (anthropic, openai, ollama, ...)
      # Set MODEL_PROVIDER + MODEL_NAME + provider API key
      MODEL_PROVIDER: ${MODEL_PROVIDER:-gemini}
      MODEL_NAME: ${MODEL_NAME:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_MODEL_VERSION: ${GEMINI_MODEL_VERSION:-gemini-2.0-flash}

      # Session store
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-agents}:${POSTGRES_PASSWORD:-agents_secret}@postgres:5432/${POSTGRES_DB:-agents}"

      # Metrics
      ENABLE_METRICS_SERVER: "true"

      # Agent-specific
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      ALERTMANAGER_URL: http://alertmanager:9093
    volumes:
      - devops-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["adk", "web", "--host", "0.0.0.0", "--port", "8000", "agents/orrery-assistant"]

  # ── Slack bot (use: docker compose --profile slack up) ────────────

  slack-bot:
    image: ${ORRERY_IMAGE:-ghcr.io/bahalla/orrery:latest}
    build: .
    container_name: slack-bot
    profiles: [slack]
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    environment:
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}

      MODEL_PROVIDER: ${MODEL_PROVIDER:-gemini}
      MODEL_NAME: ${MODEL_NAME:-}
      GOOGLE_GENAI_USE_VERTEXAI: "FALSE"
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_MODEL_VERSION: ${GEMINI_MODEL_VERSION:-gemini-2.0-flash}

      # Session store
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-agents}:${POSTGRES_PASSWORD:-agents_secret}@postgres:5432/${POSTGRES_DB:-agents}"

      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      ALERTMANAGER_URL: http://alertmanager:9093
    volumes:
      - slack-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["uvicorn", "slack_bot.app:api", "--host", "0.0.0.0", "--port", "3000"]

volumes:
  kafka-data:
  postgres-data:
  prometheus-data:
  loki-data:
  elasticsearch-data:
  assistant-data:
  slack-data:
