site_name: Orrery — AI Agents for DevOps & SRE
site_url: https://bahalla.github.io/orrery/
repo_url: https://github.com/BAHALLA/orrery
repo_name: BAHALLA/orrery
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    logo: material/robot-outline
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
    - content.tabs.link

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BAHALLA/orrery
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/orrery-core/

copyright: Copyright &copy; 2026 Taoufiq &mdash; Built with Google ADK

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      type: iso_date
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - mkdocstrings:
      handlers:
        python:
          paths: [core, agents/docker-agent, agents/kafka-health, agents/k8s-health, agents/observability, agents/orrery-assistant, agents/ops-journal, agents/slack-bot, agents/google-chat-bot]

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started.md
    - Configuration:
      - General: config/general.md
      - Agents: config/agents.md
  - Architecture:
    - Design Patterns: agent-design-patterns.md
    - ADRs:
      - "ADR-001: RBAC": adr/001-rbac.md
      - "ADR-002: Agent Composition": adr/002-agent-tool-vs-sub-agents.md
  - Platform Features:
    - Agents Overview: agents-overview.md
    - Guardrails & RBAC: guardrails.md
    - Testing RBAC: rbac-testing.md
    - Cross-Session Memory: memory.md
    - Observability & Metrics: metrics.md
  - Operations:
    - Production Deployment: deployment.md
    - Troubleshooting: troubleshooting.md
    - Integrations:
      - Overview: integrations.md
      - Slack: integrations/slack.md
      - Google Chat:
        - Overview: integrations/google-chat.md
        - HTTP Webhook Setup: integrations/google-chat-webhook.md
        - Pub/Sub Setup: integrations/google-chat-pubsub.md
  - Developer Guide:
    - Adding a New Agent: adding-an-agent.md
    - Core Library: core/README.md
  - Agent Reference:
    - Devops Assistant: agents/orrery-assistant.md
    - Docker Agent: agents/docker-agent.md
    - K8s Health: agents/k8s-health.md
    - Kafka Health: agents/kafka-health.md
    - Observability: agents/observability.md
    - Ops Journal: agents/ops-journal.md
    - Slack Bot: agents/slack-bot.md
    - Google Chat Bot: agents/google-chat-bot.md
  - Roadmap (AEP):
    - Overview: enhancements/README.md
    - "AEP-001: Tool Confirmation": enhancements/aep-001-adk-native-confirmation.md
    - "AEP-002: Agent Evaluation": enhancements/aep-002-agent-evaluation.md
    - "AEP-003: Memory Service": enhancements/aep-003-memory-service.md
    - "AEP-004: Remediation Loop": enhancements/aep-004-loop-agent-remediation.md
    - "AEP-005: A2A Protocol": enhancements/aep-005-a2a-protocol.md
    - "AEP-006: Artifacts": enhancements/aep-006-artifacts.md
    - "AEP-007: Context Caching": enhancements/aep-007-context-caching.md
    - "AEP-008: Skills": enhancements/aep-008-skills.md
    - "AEP-009: Streaming": enhancements/aep-009-streaming.md
    - "AEP-010: Observability": enhancements/aep-010-observability-tracing.md
    - "AEP-011: Deployment": enhancements/aep-011-deployment-hardening.md
    - "AEP-012: Custom Agents": enhancements/aep-012-custom-agents.md
    - "AEP-013: Security": enhancements/aep-013-security-hardening.md
    - "AEP-014: Supply Chain Security": enhancements/aep-014-supply-chain-security.md
    - "AEP-015: Cost Observability": enhancements/aep-015-cost-observability.md
    - "AEP-016: Load & Chaos Testing": enhancements/aep-016-load-chaos-testing.md
    - "AEP-017: Runbooks & On-Call": enhancements/aep-017-runbooks-oncall.md
  - Project:
